name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    tags: ["v*"]
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Fast, required gate: formatting, lints, and tests. Runs on every PR and is
  # the branch-protection required check (the master-only nix/cachix build below
  # is skipped on PRs).
  rust:
    name: fmt + clippy + test
    if: >
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # OPENUSAGE_OFFLINE keeps the pricing layer from fetching during tests.
      - run: cargo test --all
        env:
          OPENUSAGE_OFFLINE: "1"

  # Cross-platform compile + test on GitHub's native macOS and Windows runners.
  # open-usage is Linux-native today, but the cross-platform port keeps the crate
  # building everywhere; this proves it on real mac/Windows (the Linux dev host
  # can't cross-compile the bundled C deps). Informational on PRs, not the
  # required gate.
  cross:
    name: cross (${{ matrix.os }})
    if: >
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Proves the crate (bin + tests) compiles on this OS.
      - run: cargo check --all-targets
      # Proves the existing tests pass; the broken-pipe test is Unix-gated out.
      - run: cargo test --all
        env:
          OPENUSAGE_OFFLINE: "1"

  build:
    name: build (${{ matrix.system }})
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'pull_request'
          && github.event.action == 'closed'
          && github.event.pull_request.merged == true
          && github.event.pull_request.base.ref == 'master')
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'pull_request'
          && github.event.action == 'closed'
          && github.event.pull_request.merged == true
          && github.event.pull_request.base.ref == 'master')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Configures the grok-insider cache as a substituter AND pushes every newly
      # built store path to it (using the CACHIX_AUTH_TOKEN secret). nix-community
      # is pulled so build dependencies come from cache where possible.
      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build open-usage
        run: nix build .#packages.${{ matrix.system }}.default -L

      - name: Flake check
        run: nix flake check -L
