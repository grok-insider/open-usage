name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, required gate: formatting, lints, and tests. Runs on every PR and is
  # the branch-protection required check (the master-only nix/cachix build below
  # is skipped on PRs).
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # OPENUSAGE_OFFLINE keeps the pricing layer from fetching during tests.
      - run: cargo test --all
        env:
          OPENUSAGE_OFFLINE: "1"

  build:
    name: build (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Configures the grok-insider cache as a substituter AND pushes every newly
      # built store path to it (using the CACHIX_AUTH_TOKEN secret). nix-community
      # is pulled so build dependencies come from cache where possible.
      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build open-usage
        run: nix build .#packages.${{ matrix.system }}.default -L

      - name: Flake check
        run: nix flake check -L
