name: Release-plz

# When a PR into master is merged, keep a single standing "Release PR" up to date:
# release-plz bumps the version, and release-changelog-action@v1 writes the
# user-facing CHANGELOG.md into that PR. Nothing is published until the Release PR
# is merged (release_always = false), at which point release-plz tags + creates the
# GitHub Release, which triggers release.yml to attach the binaries.
#
# Requires two repo secrets:
#   RELEASE_PLZ_TOKEN  fine-grained PAT (Contents + Pull requests: RW). Needed so
#                      the Release PR runs the required CI check and so the created
#                      release triggers release.yml (the default GITHUB_TOKEN can do
#                      neither on a branch-protected repo).
#   OPENROUTER_API_KEY OpenRouter key for the changelog model (deepseek/deepseek-v4-flash).

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:


permissions: {}

jobs:
  # Gate the whole pipeline on the PAT being configured, so the workflow skips
  # cleanly (rather than failing) on repos/forks without RELEASE_PLZ_TOKEN.
  # secrets.* can't be used in a job-level `if:`, hence this preflight job.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    if: >
      github.repository_owner == 'grok-insider'
      && (github.event_name == 'workflow_dispatch'
          || (github.event_name == 'pull_request'
              && github.event.pull_request.merged == true))
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -n "$RELEASE_PLZ_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RELEASE_PLZ_TOKEN not set — skipping release-plz. Add the secret to enable automated releases."
          fi

  # Maintain the standing Release PR: version bump (release-plz) + AI CHANGELOG.md.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          # Persist the PAT so the AI step can push a commit to the Release PR branch.
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (open/update the Release PR)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Check out the Release PR
        if: ${{ steps.release-plz.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail
          pr_number="$(jq -r '.number // empty' <<<"$PR_JSON")"
          version="$(jq -r '.releases[0].version // empty' <<<"$PR_JSON")"
          if [ -z "$pr_number" ] || [ -z "$version" ]; then
            echo "No Release PR / version in output; nothing to do."
            exit 0
          fi
          echo "Release PR #$pr_number prepares v$version"
          gh pr checkout "$pr_number"
          prev_tag="$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)"
          if [ -n "$prev_tag" ]; then range="${prev_tag}..HEAD"; else range="HEAD"; fi
          {
            echo "RP_PR=$pr_number"
            echo "RP_VER=$version"
            echo "RP_RANGE=$range"
          } >> "$GITHUB_ENV"

      - name: Write AI-generated CHANGELOG into the Release PR
        if: ${{ env.RP_PR != '' }}
        uses: grok-insider/release-changelog-action@v1
        with:
          version: ${{ env.RP_VER }}
          range: ${{ env.RP_RANGE }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          project-description: "open-usage multi-provider usage monitor: daemon, CLI, and Waybar for paid AI quotas"

      - name: Commit AI changelog to the Release PR
        if: ${{ env.RP_PR != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already up to date."
          else
            git add CHANGELOG.md
            git commit -m "docs(changelog): generate release notes for v${RP_VER}"
            git push
          fi

  # On Release PR merge: tag + create the GitHub Release (release_always = false
  # means nothing is released on ordinary pushes).
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (tag + GitHub Release)
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # PAT so the created release/tag triggers release.yml to attach binaries.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
