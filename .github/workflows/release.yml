name: Release

# Triggered when a GitHub Release is published (by release-plz, via release-plz.yml).
# Builds the `openusage` binary for each supported target and attaches a tar.gz
# (+ sha256), and syncs the release notes from the matching CHANGELOG.md section.
#
# open-usage is a single crate with no async runtime; TLS is rustls and SQLite is
# bundled, so the Linux targets build fully static via cargo-zigbuild with no system
# libraries. macOS and Windows are built natively on their matching runners. The
# cross-platform credential/process seams (SecretStore, ProcessList) landed in
# Phase 1, so darwin (x86_64 + aarch64) and windows (x86_64-msvc) ship alongside
# Linux. Linux/macOS are packaged as tar.gz; Windows as zip.
#
# `workflow_dispatch` lets you rebuild/attach binaries for an existing tag manually.
# Ordinary PR merges into master do NOT run this workflow (avoids empty RELEASE_TAG).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (e.g. v0.0.2) to rebuild/upload binaries for
        required: true
        type: string


permissions:
  contents: write

jobs:
  # Set the GitHub Release body from the AI-written CHANGELOG.md section.
  notes:
    name: Sync release notes
    if: >
      github.repository_owner == 'grok-insider'
      && (github.event_name == 'release'
          || (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Set release body from CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${TAG:-}" ]; then
            echo "No tag; skipping notes sync."
            exit 0
          fi
          version="${TAG#v}"
          # Extract the body of the `## <version>` section (without the heading).
          awk -v version="$version" '
            /^## / { if (found) exit; if ($2 == version) { found = 1; next } }
            found { print }
          ' CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then
            echo "Updating $TAG notes from CHANGELOG.md"
            gh release edit "$TAG" --notes-file notes.md
          else
            echo "No CHANGELOG.md section for $version; leaving the release body as-is."
          fi

  artifacts:
    name: ${{ matrix.target }}
    if: >
      github.repository_owner == 'grok-insider'
      && (github.event_name == 'release'
          || (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: fully static musl via cargo-zigbuild.
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: zig, archive: tar }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: zig, archive: tar }
          # macOS: native build on the matching runner (Intel + Apple Silicon).
          - { os: macos-13, target: x86_64-apple-darwin, archive: tar }
          - { os: macos-latest, target: aarch64-apple-darwin, archive: tar }
          # Windows: native MSVC build.
          - { os: windows-latest, target: x86_64-pc-windows-msvc, archive: zip }
    env:
      TARGET: ${{ matrix.target }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Require non-empty release tag
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG:-}" ]; then
            echo "::error::RELEASE_TAG is empty; refusing to build/upload"
            exit 1
          fi
          echo "Building for $RELEASE_TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        if: matrix.cross == 'zig'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross == 'zig'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      # Linux uses cargo-zigbuild for a fully static musl binary; macOS/Windows
      # build natively on their matching runner.
      - name: Build (static, Linux)
        if: matrix.cross == 'zig'
        run: cargo zigbuild --release --target "$TARGET"
      - name: Build (native)
        if: matrix.cross != 'zig'
        run: cargo build --release --target "$TARGET"

      # Static-linking guarantee only applies to the musl Linux binaries.
      - name: Verify static (Linux)
        if: matrix.cross == 'zig'
        run: |
          set -euo pipefail
          f="target/$TARGET/release/openusage"
          file "$f"
          if ldd "$f" 2>&1 | grep -qiE 'libc\.so|GLIBC'; then
            echo "::error::openusage is dynamically linked against glibc"; exit 1
          fi

      # tar.gz for Linux/macOS; zip for Windows. Bash is available on all three
      # GitHub runners (Git Bash on Windows), so one shell script covers both.
      - name: Package + upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          stage="open-usage-${version}-${TARGET}"
          mkdir -p "$stage"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            bin="openusage.exe"
          else
            bin="openusage"
          fi
          cp "target/$TARGET/release/$bin" "$stage/"
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            archive="$stage.zip"
            7z a -tzip "$archive" "$stage" >/dev/null
          else
            archive="$stage.tar.gz"
            tar -czf "$archive" "$stage"
          fi
          # sha256sum on Linux; shasum on macOS; certutil-free fallback elsewhere.
          if command -v sha256sum >/dev/null; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi
          gh release upload "$RELEASE_TAG" "$archive" "$archive.sha256" --clobber
