name: Release

# On a pushed `v*` tag: build the `openusage` binary for each supported target
# and attach a tar.gz (+ sha256) to the GitHub Release. open-usage is a single
# crate with no async runtime; TLS is rustls and SQLite is bundled, so the Linux
# targets build fully static via cargo-zigbuild with no system libraries.
#
# open-usage is Linux-native today (it reads /proc and the Secret Service). When
# the cross-platform port (macOS Keychain / Windows Credential Manager) lands,
# add the darwin/windows targets to the matrix below.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  artifacts:
    name: ${{ matrix.target }}
    if: github.repository_owner == 'grok-insider'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: zig }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: zig }
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        if: matrix.cross == 'zig'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross == 'zig'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build (static)
        run: cargo zigbuild --release --target "$TARGET"

      - name: Verify static
        run: |
          set -euo pipefail
          f="target/$TARGET/release/openusage"
          file "$f"
          if ldd "$f" 2>&1 | grep -qiE 'libc\.so|GLIBC'; then
            echo "::error::openusage is dynamically linked against glibc"; exit 1
          fi

      - name: Package + upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="open-usage-${version}-${TARGET}"
          mkdir -p "$stage"
          cp "target/$TARGET/release/openusage" "$stage/"
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          archive="$stage.tar.gz"
          tar -czf "$archive" "$stage"
          sha256sum "$archive" > "$archive.sha256"
          gh release upload "$GITHUB_REF_NAME" "$archive" "$archive.sha256" --clobber
