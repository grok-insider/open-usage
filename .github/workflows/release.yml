name: Release

# Triggered when a GitHub Release is published (by release-plz, via release-plz.yml).
# Builds the `openusage` binary for each supported target and attaches a tar.gz
# (+ sha256), and syncs the release notes from the matching CHANGELOG.md section.
#
# open-usage is a single crate with no async runtime; TLS is rustls and SQLite is
# bundled, so the Linux targets build fully static via cargo-zigbuild with no system
# libraries. open-usage's runtime credential discovery is still Linux-native, so only
# the Linux targets are shipped today; add darwin/windows here once Phase 1 lands.
#
# `workflow_dispatch` lets you rebuild/attach binaries for an existing tag manually.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build & attach binaries to, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  # Set the GitHub Release body from the AI-written CHANGELOG.md section.
  notes:
    name: Sync release notes
    if: github.repository_owner == 'grok-insider' && github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set release body from CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          # Extract the body of the `## <version>` section (without the heading).
          awk -v version="$version" '
            /^## / { if (found) exit; if ($2 == version) { found = 1; next } }
            found { print }
          ' CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then
            echo "Updating $TAG notes from CHANGELOG.md"
            gh release edit "$TAG" --notes-file notes.md
          else
            echo "No CHANGELOG.md section for $version; leaving the release body as-is."
          fi

  artifacts:
    name: ${{ matrix.target }}
    if: github.repository_owner == 'grok-insider'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: zig }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: zig }
    env:
      TARGET: ${{ matrix.target }}
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        if: matrix.cross == 'zig'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross == 'zig'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build (static)
        run: cargo zigbuild --release --target "$TARGET"

      - name: Verify static
        run: |
          set -euo pipefail
          f="target/$TARGET/release/openusage"
          file "$f"
          if ldd "$f" 2>&1 | grep -qiE 'libc\.so|GLIBC'; then
            echo "::error::openusage is dynamically linked against glibc"; exit 1
          fi

      - name: Package + upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          stage="open-usage-${version}-${TARGET}"
          mkdir -p "$stage"
          cp "target/$TARGET/release/openusage" "$stage/"
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          archive="$stage.tar.gz"
          tar -czf "$archive" "$stage"
          sha256sum "$archive" > "$archive.sha256"
          gh release upload "$RELEASE_TAG" "$archive" "$archive.sha256" --clobber
