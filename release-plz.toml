# release-plz configuration.
#
# open-usage uses release-plz to maintain a single standing "Release PR" (version
# bump + CHANGELOG), while the human-facing CHANGELOG.md is rewritten by an LLM
# (see scripts/gen-changelog.sh) into that PR. The git tag + GitHub Release only
# happen when the Release PR is merged (`release_always = false`).
#
# App binary, not crates.io — same pattern as open-sessionbar / open-recorder:
# version baseline from git tags; never cargo publish. Guard publish in THIS
# file, not Cargo.toml (manifest `publish = false` makes release-plz skip the
# package entirely → empty Release PRs).

[workspace]
# Not on crates.io: resolve current version from `v*` tags, not the registry.
git_only = true
# Never run `cargo publish` (git_only alone is not always enough).
publish = false
# Only cut tag/GitHub Release when the Release PR is merged.
release_always = false
# Keep changelog updates ON so release-plz opens a Release PR. It writes a
# baseline section; the workflow AI step overwrites it with user-facing notes.
changelog_update = true
# Binary app, not a published library API.
semver_check = false
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
pr_labels = ["release"]
