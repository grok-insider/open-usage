# release-plz configuration.
#
# open-usage uses release-plz to maintain a single standing "Release PR" (version
# bump + tag + GitHub Release), while the human-facing CHANGELOG.md is rewritten by
# an LLM (see scripts/gen-changelog.sh) into that PR. The release itself only
# happens when the PR is merged.

[workspace]
# Only release when the Release PR is merged (not on every push to master).
release_always = false

# Keep changelog updates ON so release-plz always opens a Release PR (even for the
# first release, where the version isn't bumped). release-plz writes a baseline
# changelog entry; the workflow's AI step then overwrites that section in the PR
# with user-facing notes (scripts/gen-changelog.sh + update-changelog.sh).
changelog_update = true

# crates.io publishing is disabled via `publish = false` in Cargo.toml; release-plz
# still creates the git tag and the GitHub Release.
